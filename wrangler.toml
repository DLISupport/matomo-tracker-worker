name = "matomo-tracker-worker"
main = "dist/index.js"
compatibility_date = "2024-12-08"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

[dev]
port = 8787
local_protocol = "https"

[vars]
MATOMO_URL = "https://matomo.dli.dk"
MATOMO_SITE_ID = "2"
MATOMO_TIMEOUT_MS = "5000"
LOG_LEVEL = "warn"
USER_AGENT_ALLOWLIST_REGEX = "(ChatGPT|GPTBot|Claude|Perplexity|Google-Extended|CCBot|anthropic|OpenAI)"
DOCUMENT_REGEX = "^https?:\\/\\/.*"
